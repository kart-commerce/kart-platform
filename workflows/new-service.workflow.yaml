# The dependency DAG for taking one service from BRD -> scaffolded repo.
#
# This is DATA, not an execution engine — nothing runs this file
# automatically. A human or Claude Code session walks it top to bottom:
# for each stage, check that every id in depends_on has status: approved
# (or requires_approval: false) in its output doc's frontmatter before
# running that stage's agent (see ../.claude/agents/registry.yaml for
# where each agent's definition lives).
#
# Replace <name> with the target service (e.g. kart-offer-service) when
# walking this for a specific run.

name: new-service
description: >
  BRD -> approved design package -> ticket list -> scaffolded repo,
  for one service.

stages:
  - id: requirement
    agent: requirement-agent
    depends_on: []
    requires_approval: true
    output: docs/services/<name>/requirement-spec.md

  - id: architecture
    agent: architecture-agent
    depends_on: [requirement]
    requires_approval: true
    output: docs/services/<name>/architecture.md

  - id: ddd
    agent: ddd-agent
    depends_on: [architecture]
    requires_approval: true
    output: docs/services/<name>/ddd-model.md

  - id: api-design
    agent: api-design-agent
    depends_on: [ddd]
    requires_approval: conditional  # only if it would break an existing published contract
    output: docs/services/<name>/api-contract.yaml

  - id: database-design
    agent: database-design-agent
    depends_on: [ddd]
    requires_approval: conditional  # write-model schema yes, read-model/projection changes no
    output: docs/services/<name>/database-design.md

  - id: event-design
    agent: event-design-agent
    depends_on: [ddd]
    requires_approval: true
    output: docs/services/<name>/event-contract.md

  - id: ticket
    agent: ticket-agent
    depends_on: [api-design, database-design, event-design]
    requires_approval: false
    output: docs/services/<name>/tickets.md

  - id: scaffold
    agent: scaffold-agent
    depends_on: [ticket]
    requires_approval: false
    output: "new kart-<name>-service repo, initial commit"
    note: >
      The blueprint's sprint-planner-agent stage is skipped between
      ticket and scaffold for this project — no team/capacity to plan
      sprints around (see kart-platform README's Agent Pipeline section).

notes:
  - api-design, database-design, and event-design have no ordering
    dependency on each other — only on ddd. Run in any order, or in
    parallel.
  - This file is read, not executed. It exists so sequencing is a
    versioned fact in the repo instead of something re-derived from
    docs/PLATFORM_BLUEPRINT.md prose every time.
