info:
  title: kart-notification-service API
  version: 1.0.0
  description: >
    This service exposes NO public API and NO internal-ops API. kart-notification-service is
    consumer-only (requirement-spec.md §5.4/§2; reaffirmed verbatim in architecture.md's Boundary
    Rationale and design-decisions.md's Communication Style decision) — it is driven entirely by
    consuming events off the `ecommerce.events` RabbitMQ topic exchange (`order.*`, `payment.*`,
    plus dedicated routing keys for `WishlistPriceAlertTriggered`, `UserRegistered`,
    `ShipmentDispatched`, `DeliveryStatusUpdated`, and `UserNotificationPreferenceUpdated`) and
    publishing one outbound audit event (`NotificationSent`). There is no synchronous inbound
    surface of any kind for any client, service, or internal ops/support tool to call. The one
    candidate synchronous surface considered upstream — a Notification-owned API for users to set
    per-channel/per-category opt-out preferences — was explicitly evaluated and rejected in favor
    of the `UserNotificationPreferenceUpdated` consumed event (architecture.md's "Resolved
    Integration-Contract Question" section), precisely to preserve this no-public-API boundary.
    All request/response contracts for this service belong in its `event-contract.md` (Event
    Design Agent's output), not this file. This document is intentionally empty of paths; it
    exists to make the absence of an API surface explicit and discoverable, not to define one.

