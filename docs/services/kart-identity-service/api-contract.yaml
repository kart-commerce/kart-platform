# Two endpoints below are additions beyond requirement-spec.md §5's starting
# API Surface table, added because a stated FR is otherwise unusable without
# them (the same reasoning the requirement-spec itself used to add
# /auth/logout, /auth/mfa/verify, and the password-reset pair):
#   - POST /v1/auth/register: requirement-spec.md §2 states "Register a new
#     user identity, publishing UserRegistered on success" as a Cross-service
#     event-publishing FR, and BRD §24.2 states a native email/password
#     account model exists alongside federation — but no row in the API
#     Surface table (§5) actually triggers this. Added here.
#   - POST /v1/auth/mfa/enroll and POST /v1/auth/mfa/enroll/confirm:
#     requirement-spec.md §2 states MFA is "optional, customer-elected, off
