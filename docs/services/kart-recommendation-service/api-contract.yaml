openapi: 3.0.3
info:
  title: kart-recommendation-service API
  version: 1.0.0
  description: >
    Personalized "customers also bought"-style recommendations (BRD §2.1 item 18;
    requirement-spec.md §1-§2). Pure read-side, consumer-only — this service owns no
    client-initiated write or delete endpoint of any kind (requirement-spec.md §1).

servers:
  - url: https://api.kart.example/recommendations
    description: >
      Public API Gateway. Serves `GET /v1/recommendations/{userId}` only — reachable by
      Client/Mobile/Web and by Support/Admin console (architecture.md Dependencies table).

security:
  - bearerAuth: []

paths:
  /v1/recommendations/{userId}:
    get:
      operationId: getRecommendationsForUser
      summary: Personalized recommendation list for one user, always populated.
      description: >
        Read-path NFR: P95 < 150ms, P99 < 400ms (architecture.md; requirement-spec §3).
        Serves the precomputed `RecommendationSet` (ddd-model.md), blending purchase
        co-occurrence, decayed behavioral signal, and a trending baseline (the Recommendation
        Model). Cold-start users (no purchase/behavior signal) and users with no
        `RecommendationSet` document yet both receive `TrendingPool`-sourced fallback content
        instead of an empty or error response (requirement-spec §4 Domain Invariant). Every
        returned item has already passed the live inventory/catalog availability filter
        (edge-cases.md), which fails open (serves the item unfiltered) on a timeout/circuit-trip
        against Inventory or Product — see `availabilityFilterApplied` below, which surfaces
        that degraded state rather than hiding it (`ddd-cqrs-standards.md`'s "eventual
        consistency windows must be surfaced to the client, never hidden").
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: >
            The Identity-issued `UserId` (ddd-model.md — referenced, never redefined here).
            CanRead requires the caller's own `token.sub` to equal this value, unless the
            caller holds the Admin or Support Agent role (ddd-model.md's CanRead invariant).
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
          description: >
            Maximum items returned. No `page`/cursor parameter — a personalized recommendation
            list is a bounded top-N ranked set by nature (ddd-model.md's `RecommendationSet.items`
            is itself capped at write time), not a deeply paginated collection the way
            `kart-search-service`'s catalog-wide result set is; a client wanting more than 50
            items is outside this endpoint's intended use (engineering default, not BRD-stated).
      responses:
        '200':
          description: >
            Always returned for a syntactically valid, authorized `userId` — never `404`, even
            for a `userId` with no purchase/behavioral history or no `RecommendationSet` document
            yet (requirement-spec §4 Domain Invariant; see `source` on each item).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationResponse'
        '400':
          description: Malformed request — `userId` not a valid UUID, or `limit` out of `[1,50]`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: >
            Authenticated caller's `token.sub` does not match the path `userId`, and the caller
            holds neither the Admin nor Support Agent role (ddd-model.md's CanRead invariant;
            BRD §24.1.2's Cart/Wishlist/User Service precedent for the same ownership-check shape).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Identity-issued access token (BRD §24.1). `sub` claim carries the caller's `UserId`; `roles` claim carries `Customer`/`Admin`/`Support Agent`.

  schemas:
    RecommendedItem:
      type: object
      required: [sku, score, source]
      properties:
        sku: { type: string }
        score:
          type: number
          format: double
          description: >
            The Recommendation Model's blended score (ddd-model.md) — purchase affinity,
            behavioral signal, and trending baseline combined. Not independently meaningful
            across users/requests; valid only for ordering within this one response.
        source:
          type: string
          enum: [Personalized, Fallback]
          description: >
            `Personalized` when `purchaseAffinity` or `behaviorSignal` contributed a non-zero
            term (ddd-model.md); `Fallback` when the item came from `TrendingPool` only (a
            genuine cold-start user, or a newly catalogued product still on its neutral seed).

    RecommendationResponse:
      type: object
      required: [userId, items, generatedAt, availabilityFilterApplied]
      properties:
        userId: { type: string, format: uuid }
        items:
          type: array
          items: { $ref: '#/components/schemas/RecommendedItem' }
          description: >
            Ranked, highest score first, capped at `limit`. Every item has already passed the
            live availability filter (out-of-stock/discontinued items are removed before this
            list is capped to `limit`, so a `limit`-sized response is never short by a filtered
            item unless fewer than `limit` candidates exist at all).
        generatedAt:
          type: string
          format: date-time
          description: >
            The `RecommendationSet`'s own `generatedAt` (ddd-model.md) — when the underlying
            precomputed list was last (re)computed, not when this HTTP response was served. For
            a `userId` with no `RecommendationSet` document yet, this is `TrendingPool`'s own
            `computedAt` instead, since the fallback content's freshness is what's actually being
            reported in that case.
        availabilityFilterApplied:
          type: boolean
          description: >
            `false` only when the live Inventory/Product availability check's circuit breaker
            was open or the call timed out for this request, and the fail-open mitigation
            (`design-decisions.md`) served `items` unfiltered rather than dropping every
            candidate — surfaced explicitly rather than silently returning a possibly-unsellable
            item with no indication anything degraded (`ddd-cqrs-standards.md`).

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHENTICATED, FORBIDDEN_OWNERSHIP_MISMATCH]
        message: { type: string }
        timestamp: { type: string, format: date-time }
